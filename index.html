<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NEXT CHAPTER</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B4332;--green2:#2D5243;--green3:#3D6B57;
  --sage:#6A9E87;--sage-lt:#EAF3EE;
  --coral:#C0392B;--coral2:#E04535;--coral-lt:#FDECEA;
  --gold:#C79020;--gold-lt:#FEF9EC;
  --purple:#7C5CBF;--purple-lt:#F3EFFC;
  --bg:#F0F4F1;--card:#FFFFFF;
  --ink:#1A1A1A;--ink2:#4A4A4A;--ink3:#888888;
  --border:#E8E8E8;--border2:#D0D0D0;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:15px}

/* ─── ONBOARDING ─── */
#onboarding{position:fixed;inset:0;background:var(--green);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px}
#onboarding.hidden{display:none}
.ob-card{background:var(--card);border-radius:20px;padding:32px 24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.ob-logo{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--green);margin-bottom:4px;text-align:center}
.ob-logo-sub{font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);text-align:center;margin-bottom:28px}
.ob-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink);margin-bottom:6px}
.ob-desc{font-size:.85rem;color:var(--ink3);margin-bottom:24px;line-height:1.6}
.ob-fg{margin-bottom:16px}
.ob-fg label{display:block;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.ob-fg input,.ob-fg select{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;-webkit-appearance:none}
.ob-fg input:focus,.ob-fg select:focus{border-color:var(--green);background:var(--card)}
.ob-btn{width:100%;background:var(--green);color:white;border:none;border-radius:12px;padding:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;margin-top:8px;transition:all .2s}
.ob-btn:hover{background:var(--green2)}
.ob-btn:disabled{opacity:.6;cursor:not-allowed}
.ob-note{font-size:.75rem;color:var(--ink3);text-align:center;margin-top:12px;line-height:1.5}

/* ─── APP SHELL ─── */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#app.hidden{display:none}
#app-header{background:var(--green);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;flex-shrink:0;padding-top:env(safe-area-inset-top,0px)}
.ah-logo{font-family:'DM Serif Display',serif;font-size:.95rem;color:rgba(255,255,255,.9);letter-spacing:.3px}
.ah-center{font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5)}
.ah-right{display:flex;align-items:center;gap:8px}
.ah-save-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .4s;flex-shrink:0}
.ah-save-dot.saving{background:#FFD166}
.ah-save-dot.saved{background:#52B788}
.ah-save-dot.error{background:#FF4757}
.ah-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:white;border:1.5px solid rgba(255,255,255,.3);flex-shrink:0;cursor:pointer}
.ah-name{font-size:.72rem;color:rgba(255,255,255,.65);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none}
@media(min-width:360px){.ah-name{display:block}}

/* ─── CONTENT AREA ─── */
#app-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tab-panel{display:none;padding:14px;padding-bottom:calc(14px + 62px + var(--safe-bottom))}
.tab-panel.active{display:block}
@media(min-width:600px){.tab-panel{padding:20px;padding-bottom:calc(20px + 68px + var(--safe-bottom));max-width:680px;margin:0 auto}}

/* ─── BOTTOM NAV ─── */
#bottom-nav{background:white;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(6,1fr);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.bnav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;gap:2px;transition:all .15s;position:relative;min-height:54px}
.bnav-btn .bi{font-size:1.2rem;line-height:1;transition:transform .2s}
.bnav-btn .bl{font-size:.5rem;font-weight:600;color:var(--ink3);letter-spacing:.3px;white-space:nowrap;transition:color .2s}
.bnav-btn.active .bi{transform:scale(1.1)}
.bnav-btn.active .bl{color:var(--green);font-weight:700}
.bnav-btn.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2.5px;background:var(--green);border-radius:0 0 3px 3px}

/* ─── CARDS ─── */
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-family:'DM Serif Display',serif;font-size:1.05rem;font-weight:400;margin-bottom:4px}
.card-sub{font-size:.78rem;color:var(--ink3);margin-bottom:12px;line-height:1.5;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-lbl{font-size:.66rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-lbl::before{content:'';display:block;width:14px;height:1.5px;background:var(--ink3)}

/* ─── FORM ─── */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:.66rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.88rem;resize:vertical;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--green);background:white}
.fg textarea{min-height:68px;line-height:1.55}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-g{background:var(--green);color:white;border:none;border-radius:10px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.83rem;cursor:pointer;transition:all .2s}
.btn-g:hover{background:var(--green2)}
.btn-c{background:var(--coral);color:white;border:none;border-radius:10px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.83rem;cursor:pointer;transition:all .2s}
.btn-c:hover{background:var(--coral2)}
.btn-o{background:transparent;color:var(--ink2);border:1.5px solid var(--border2);border-radius:10px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.83rem;cursor:pointer;transition:all .2s}
.btn-o:hover{background:var(--bg)}
.btn-s{background:var(--sage-lt);color:var(--green);border:1.5px solid rgba(106,158,135,.35);border-radius:10px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.83rem;cursor:pointer;transition:all .2s}
.row-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.full{width:100%}
.hlp{font-size:.75rem;color:var(--ink3);margin-top:5px;line-height:1.5}

/* ─── EKSPLORASI ─── */
.eks-jbar{background:var(--sage-lt);border:1.5px solid rgba(106,158,135,.3);border-radius:12px;padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ejb-inf h4{font-weight:700;font-size:.83rem;margin-bottom:1px}
.ejb-inf p{font-size:.7rem;color:var(--ink3)}
.path-sel{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.path-btn{background:white;border:2px solid var(--border2);border-radius:12px;padding:12px 4px;cursor:pointer;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif}
.path-btn:hover{border-color:var(--green)}
.path-btn.active{border-color:var(--green);background:var(--green)}
.path-btn .pi{font-size:1.5rem;display:block;margin-bottom:3px}
.path-btn .pt{font-weight:700;font-size:.75rem;display:block;color:var(--ink)}
.path-btn.active .pt{color:white}
.jobs-list,.prodi-list,.biz-list,.adm-list{display:flex;flex-direction:column;gap:9px;margin-bottom:10px}
.job-card,.prodi-item,.biz-card,.adm-card{background:var(--bg);border-radius:10px;padding:11px}
.job-card{border-left:3px solid var(--coral)}
.prodi-item{border-top:3px solid var(--green)}
.biz-card{border-bottom:3px solid var(--gold)}
.adm-card.snbp{border-top:3px solid var(--gold);background:var(--gold-lt)}
.adm-card.snbt{border-top:3px solid var(--green);background:var(--sage-lt)}
.adm-card.mandiri{border-top:3px solid var(--purple);background:var(--purple-lt)}
.job-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:5px;margin-bottom:3px}
.job-title{font-weight:700;font-size:.85rem;flex:1;line-height:1.3}
.dbadge{padding:.17rem .45rem;font-size:.58rem;font-weight:700;letter-spacing:.3px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.dbadge.sT{background:var(--sage-lt);color:var(--green)}.dbadge.T{background:var(--coral-lt);color:var(--coral)}.dbadge.S{background:var(--gold-lt);color:var(--gold)}.dbadge.B{background:var(--purple-lt);color:var(--purple)}
.job-gaji{font-size:.75rem;font-weight:700;color:var(--gold);margin-bottom:3px}
.job-desc,.prodi-ket,.biz-card p{font-size:.76rem;color:var(--ink3);line-height:1.5;margin-bottom:5px}
.job-skills{display:flex;gap:4px;flex-wrap:wrap}
.sc{background:white;border:1px solid var(--border2);padding:.16rem .45rem;font-size:.63rem;color:var(--ink2);border-radius:5px}
.prodi-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.prodi-name{font-weight:700;font-size:.83rem}
.prodi-lv{background:var(--sage-lt);color:var(--green);padding:.13rem .45rem;font-size:.6rem;font-weight:700;border-radius:5px}
.adm-icon{font-size:1.4rem;margin-bottom:5px}
.adm-title{font-weight:800;font-size:.88rem;margin-bottom:1px}
.adm-card.snbp .adm-title{color:var(--gold)}.adm-card.snbt .adm-title{color:var(--green)}.adm-card.mandiri .adm-title{color:var(--purple)}
.adm-sub{font-size:.68rem;color:var(--ink3);margin-bottom:6px}
.adm-items{list-style:none;display:flex;flex-direction:column;gap:3px}
.adm-items li{font-size:.76rem;color:var(--ink2);padding-left:10px;position:relative;line-height:1.5}
.adm-items li::before{content:'·';position:absolute;left:1px}
.adm-tag{display:inline-block;margin-top:6px;padding:.18rem .5rem;font-size:.6rem;font-weight:700;border-radius:5px}
.adm-card.snbp .adm-tag{background:rgba(199,144,32,.2);color:var(--gold)}.adm-card.snbt .adm-tag{background:rgba(27,67,50,.12);color:var(--green)}.adm-card.mandiri .adm-tag{background:rgba(124,92,191,.12);color:var(--purple)}
.biz-card h4{font-weight:700;font-size:.83rem;margin-bottom:2px}
.biz-tags{display:flex;gap:4px;flex-wrap:wrap}
.btag{padding:.16rem .45rem;font-size:.63rem;font-weight:700;border-radius:5px}
.btag.modal{background:var(--sage-lt);color:var(--green)}.btag.pot{background:var(--coral-lt);color:var(--coral)}
.pc-box{display:grid;grid-template-columns:1fr;gap:9px;margin-top:9px}
@media(min-width:480px){.pc-box{grid-template-columns:1fr 1fr}}
.p-box{background:var(--sage-lt);border-left:3px solid var(--sage);padding:11px;border-radius:0 10px 10px 0}
.c-box{background:var(--coral-lt);border-left:3px solid var(--coral);padding:11px;border-radius:0 10px 10px 0}
.p-box h4,.c-box h4{font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.p-box h4{color:var(--green)}.c-box h4{color:var(--coral)}
.p-box li,.c-box li{font-size:.78rem;color:var(--ink2);line-height:1.55;margin-left:12px;margin-bottom:2px}
.tip-box{background:var(--gold-lt);border-left:3px solid var(--gold);padding:9px 11px;border-radius:0 9px 9px 0;font-size:.78rem;color:var(--ink2);line-height:1.6;margin-top:9px}
.tip-box strong{color:var(--gold)}
.fit-cols{display:grid;grid-template-columns:1fr;gap:9px;margin-bottom:9px}
@media(min-width:480px){.fit-cols{grid-template-columns:1fr 1fr}}
.fit-match{background:var(--sage-lt);border-left:3px solid var(--sage);padding:11px;border-radius:0 10px 10px 0}
.fit-gap{background:var(--coral-lt);border-left:3px solid var(--coral);padding:11px;border-radius:0 10px 10px 0}
.fit-match h4,.fit-gap h4{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.fit-match h4{color:var(--green)}.fit-gap h4{color:var(--coral)}
.fit-item{display:flex;gap:5px;margin-bottom:4px}
.fit-dot{width:5px;height:5px;border-radius:50%;margin-top:.4rem;flex-shrink:0}
.fit-item p{font-size:.78rem;color:var(--ink2);line-height:1.5}
.fit-rec{background:var(--gold-lt);border-left:3px solid var(--gold);padding:10px 11px;border-radius:0 10px 10px 0;margin-top:0}
.fit-rec h4{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.fit-rec p{font-size:.78rem;color:var(--ink2);line-height:1.6}

/* ─── DASHBOARD ─── */
.dash-greet{margin-bottom:12px}
.dash-greet h2{font-family:'DM Serif Display',serif;font-size:1.3rem;font-weight:400;margin-bottom:3px}
.dash-greet p{font-size:.78rem;color:var(--ink3)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:10px}
.stat-card{background:var(--card);border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-bottom:3px solid var(--border)}
.stat-card.s1{border-bottom-color:var(--coral)}.stat-card.s2{border-bottom-color:var(--green)}.stat-card.s3{border-bottom-color:var(--gold)}.stat-card.s4{border-bottom-color:var(--purple)}
.stat-icon{font-size:1.2rem;margin-bottom:4px}
.stat-val{font-family:'DM Serif Display',serif;font-size:1.9rem;line-height:1;margin-bottom:2px}
.stat-card.s1 .stat-val{color:var(--coral)}.stat-card.s2 .stat-val{color:var(--green)}.stat-card.s3 .stat-val{color:var(--gold)}.stat-card.s4 .stat-val{color:var(--purple)}
.stat-lbl{font-size:.6rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3)}
.prog-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.prog-lbl{font-size:.7rem;color:var(--ink3);width:100px;flex-shrink:0}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s ease}
.prog-n{font-size:.66rem;color:var(--ink3);width:26px;text-align:right;flex-shrink:0}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.prog-top span{font-size:.78rem;color:var(--ink3)}
.prog-top strong{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--green)}
.heatmap{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.hm-cell{width:16px;height:16px;border-radius:3px;background:var(--border)}
.hm-cell.filled{background:var(--green);opacity:.8}
.hm-cell.today{outline:2px solid var(--coral);outline-offset:1px}
.dash-cta{background:var(--green);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.dash-cta h4{font-family:'DM Serif Display',serif;font-weight:400;font-size:.95rem;color:white;margin-bottom:2px}
.dash-cta p{font-size:.76rem;color:rgba(255,255,255,.65)}
.btn-cta{background:var(--coral);color:white;border:none;border-radius:9px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-cta:hover{background:var(--coral2)}
.btn-cta.done{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border:1.5px solid rgba(255,255,255,.3)}

/* ─── JOURNAL ─── */
.mood-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.mood-btn{width:38px;height:38px;border:2px solid var(--border2);background:var(--bg);border-radius:9px;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mood-btn.active{border-color:var(--coral);background:var(--coral-lt)}
.dim-tabs{display:flex;gap:0;border-bottom:1.5px solid var(--border);margin-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.dim-tab{padding:8px 12px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:.73rem;font-weight:600;text-transform:uppercase;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .2s;white-space:nowrap}
.dim-tab.active{color:var(--coral);border-bottom-color:var(--coral)}
.dim-panel{display:none}.dim-panel.active{display:block}
.rating-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.rating-btn{padding:6px 8px;border:1.5px solid var(--border2);background:var(--bg);border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:700;color:var(--ink3);transition:all .2s;min-width:32px;text-align:center;font-family:'DM Sans',sans-serif}
.rating-btn.active{background:var(--coral);border-color:var(--coral);color:white}
.today-done{background:var(--sage-lt);border:1.5px solid rgba(106,158,135,.3);border-left:4px solid var(--sage);border-radius:12px;padding:11px 13px;margin-bottom:10px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}
.hist-hdr h3{font-weight:700;font-size:.8rem;letter-spacing:.5px;text-transform:uppercase}
.hist-ct{font-size:.7rem;color:var(--ink3);background:var(--border);padding:.2rem .55rem;border-radius:9px}
.entry-card{background:var(--card);border-radius:12px;padding:11px;cursor:pointer;transition:all .2s;margin-bottom:7px;border-left:3px solid var(--border2);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.entry-card:hover{border-left-color:var(--coral)}
.entry-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.entry-date{font-weight:700;font-size:.8rem}
.entry-preview{font-size:.76rem;color:var(--ink3);line-height:1.5;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.entry-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.etag{padding:.15rem .45rem;font-size:.6rem;font-weight:700;border-radius:5px}
.etag.academic{background:var(--gold-lt);color:var(--gold)}.etag.career{background:var(--coral-lt);color:var(--coral)}.etag.personal{background:var(--sage-lt);color:var(--green)}

/* ─── GOALS ─── */
.goals-empty-box{text-align:center;padding:22px;background:var(--bg);border:2px dashed var(--border2);border-radius:14px;margin-bottom:12px}
.goals-empty-box h3{font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:5px}
.goals-empty-box p{font-size:.8rem;color:var(--ink3);margin-bottom:12px;line-height:1.5}
.tier-sec{margin-bottom:14px}
.tier-hdr{display:flex;align-items:center;gap:7px;margin-bottom:7px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.tlbl{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.28rem .7rem;border-radius:5px}
.tlbl.pendek{background:var(--coral-lt);color:var(--coral)}.tlbl.menengah{background:var(--sage-lt);color:var(--green)}.tlbl.panjang{background:var(--purple-lt);color:var(--purple)}
.tier-sub{font-size:.73rem;color:var(--ink3)}
.goal-item{background:var(--card);border-radius:12px;padding:11px;margin-bottom:7px;border-left:3px solid var(--border2);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.goal-item-top{display:flex;justify-content:space-between;gap:7px;margin-bottom:4px}

// ══════════════════════════════════════════════════
// STORAGE — single key, robust save/load
// ══════════════════════════════════════════════════
const STORE_KEY = 'nc_data_v3';

let _savePending = false;
let _saveOK = true;

function setSaveDot(state) {
  const d = document.getElementById('save-dot');
  if (!d) return;
  d.className = 'ah-save-dot';
  if (state === 'saving') d.classList.add('saving');
  else if (state === 'saved') d.classList.add('saved');
  else if (state === 'error') d.classList.add('error');
}

async function saveAll() {
  setSaveDot('saving');
  const json = JSON.stringify(ST);
  try {
    // Coba window.storage dulu (Claude artifact environment)
    if (window.storage) {
      const result = await window.storage.set(STORE_KEY, json);
      if (!result) throw new Error('null result');
    } else {
      // Fallback: localStorage (GitHub Pages / browser biasa)
      localStorage.setItem(STORE_KEY, json);
    }
    setSaveDot('saved');
    _saveOK = true;
    setTimeout(() => setSaveDot(''), 2000);
    return true;
  } catch(e) {
    // window.storage gagal → coba localStorage sebagai fallback
    try {
      localStorage.setItem(STORE_KEY, json);
      setSaveDot('saved');
      _saveOK = true;
      setTimeout(() => setSaveDot(''), 2000);
      return true;
    } catch(e2) {
      setSaveDot('error');
      _saveOK = false;
      return false;
    }
  }
}

async function loadAll() {
  let json = null;
  // Coba window.storage dulu (Claude artifact environment)
  if (window.storage) {
    try {
      const r = await window.storage.get(STORE_KEY);
      if (r?.value) json = r.value;
    } catch(e) { /* key belum ada */ }
  }
  // Fallback: localStorage (GitHub Pages / browser biasa)
  if (!json) {
    try { json = localStorage.getItem(STORE_KEY); } catch(e) {}
  }
  if (json) {
    try {
      const saved = JSON.parse(json);
      if (saved.profile) ST.profile = saved.profile;
      if (Array.isArray(saved.journal)) ST.journal = saved.journal;
      if (saved.goals) ST.goals = { pendek:[], menengah:[], panjang:[], ...saved.goals };
      if (Array.isArray(saved.portfolio)) ST.portfolio = saved.portfolio;
      if (saved.milestones) ST.milestones = { ...ST.milestones, ...saved.milestones };
      return true;
    } catch(e) {}
  }
  return false;
}

function fmtD(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${+d} ${MN[+m-1]} ${y}`;}
function fmtS(iso){if(!iso)return'';const[,m,d]=iso.split('-');return`${d}/${m}`;}

function toast(msg,col='var(--green)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=col;t.style.color='white';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

function streak(){
  const ds=new Set(ST.journal.map(e=>e.date));
  let s=0,c=new Date(TODAY);
  if(!ds.has(TODAY))c.setDate(c.getDate()-1);
  while(true){const i=c.toISOString().split('T')[0];if(ds.has(i)){s++;c.setDate(c.getDate()-1);}else break;}
  return s;
}
const goalAvg=()=>{const a=[...ST.goals.pendek,...ST.goals.menengah,...ST.goals.panjang];return a.length?Math.round(a.reduce((s,g)=>s+(g.pct||0),0)/a.length):0;};
const mileProg=()=>Math.round((ST.milestones.ex.filter(Boolean).length+ST.milestones.pl.filter(Boolean).length)/11*100);
const portProg=()=>Math.min(100,Math.round(ST.portfolio.length/10*100));
const jCons=()=>{let c=0;const ds=new Set(ST.journal.map(e=>e.date));for(let i=0;i<30;i++){const d=new Date(TODAY);d.setDate(d.getDate()-i);if(ds.has(d.toISOString().split('T')[0]))c++;}return Math.round(c/30*100);};
const overall=()=>Math.round(jCons()*.30+goalAvg()*.40+portProg()*.15+mileProg()*.15);

async function completeOnboarding(){
  const nama = document.getElementById('ob-nama').value.trim();
  const jurusan = document.getElementById('ob-jurusan').value;
  if(!nama){toast('Tuliskan namamu dulu!','var(--coral)');document.getElementById('ob-nama').focus();return;}
  if(!jurusan){toast('Pilih jurusanmu terlebih dahulu','var(--coral)');return;}
  
  const btn = document.getElementById('ob-submit');
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';
  
  ST.profile.nama = nama;
  ST.profile.jurusan = jurusan;
  
  const ok = await saveAll();
  
  if(!ok){
    btn.disabled = false;
    btn.textContent = 'Mulai Worksheet →';
    toast('⚠️ Gagal menyimpan — coba lagi','var(--coral)');
    return;
  }
  
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  updateHeader();
  renderEksplorasi();
}

function updateHeader(){
  const nama = ST.profile.nama || '';
  if(!nama) return;
  const initial = nama.trim()[0]?.toUpperCase() || '?';
  document.getElementById('ah-avatar').textContent = initial;
  document.getElementById('ah-name').textContent = nama.split(' ')[0];
}

  aTab=i;

function renderFit(){
  const fb=document.getElementById('fit-box'); if(!fb) return;
  const k=ST.profile.kelebihan||'', ku=ST.profile.kekurangan||'';
  const j=ST.profile.jurusan||'other', jD=JD[j]||JD.other;
  if(!k&&!ku){
    fb.innerHTML=`<div class="card"><div class="card-title">🔍 Analisis Kecocokan</div><p class="card-sub">Isi kelebihan & kekuranganmu untuk melihat kecocokan dengan jalur <strong>${activePath}</strong></p><div class="fg"><label>✨ Kelebihan Diri</label><textarea id="fit-kl" placeholder="Komunikasi baik, teliti, suka tantangan..." style="min-height:65px"></textarea></div><div class="fg"><label>🔧 Hal yang Perlu Dikembangkan</label><textarea id="fit-ku" placeholder="Kurang percaya diri, manajemen waktu..." style="min-height:65px"></textarea></div><button class="btn-g full" onclick="saveFitProfile()">Analisis Kecocokan →</button></div>`;
    return;
  }
  const kl=k.toLowerCase(), matches=[], gaps=[];
  if(k){const mk=(jD.matchKeys||[]).filter(m=>kl.includes(m));if(mk.length)matches.push(`Sifat ${mk[0]}-mu relevan dengan bidang ${jD.nama}`);if(activePath==='bekerja'){const allS=jD.jobs.flatMap(j=>j.s).filter(s=>kl.split(/[,\s]+/).some(w=>w.length>3&&s.toLowerCase().includes(w)));if(allS.length)matches.push(`Kelebihanmu mendukung skill: ${[...new Set(allS)].slice(0,2).join(', ')}`);}matches.push(`Lulusan ${jD.nama} sangat dibutuhkan dunia kerja saat ini`);}

  if(!gaps.length){if(activePath==='bekerja')gaps.push('Tingkatkan skill teknis & raih sertifikasi kompetensi');else if(activePath==='kuliah')gaps.push('Jaga nilai rapor semester 4 & 5 untuk SNBP');else gaps.push('Mulai proyek kecil sekarang untuk melatih mental wirausaha');}
  const lastJ=ST.journal.filter(e=>e.career).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(lastJ)matches.push(`Jurnalmu (${fmtD(lastJ.date)}): "${lastJ.career.slice(0,50)}..."`);
  const recText=activePath==='bekerja'?'Bangun portofolio dari PKL dan siapkan CV profesional. Latih simulasi wawancara bersama Guru BK.':activePath==='kuliah'?'Fokus nilai rapor untuk SNBP. Mulai latihan soal UTBK sekarang. Riset prodi & cek passing grade kampus impianmu.':'Validasi ide bisnis dengan calon pelanggan nyata. Mulai kecil, ukur hasilnya, lalu berkembang.';

function selMood(v){if(editId){const e=ST.journal.find(x=>x.id===editId);if(e)e.mood=v;}else sMood=v;document.querySelectorAll('.mood-btn').forEach((b,i)=>b.classList.toggle('active',String(i+1)===v));}
function selRating(v){if(editId){const e=ST.journal.find(x=>x.id===editId);if(e)e.goalRating=v;}else sRating=v;document.querySelectorAll('.rating-btn').forEach(b=>b.classList.toggle('active',b.textContent===v));}
function selDim(d){curDim=d;document.querySelectorAll('.dim-tab').forEach(t=>t.classList.toggle('active',t.dataset.dim===d));document.querySelectorAll('.dim-panel').forEach(p=>p.classList.remove('active'));const el=document.getElementById('dp-'+d);if(el)el.classList.add('active');}

async function saveEntry(exId){
  const g=id=>document.getElementById(id)?.value.trim()||'';
  const academic=g('jf-academic'),career=g('jf-career'),personal=g('jf-personal');
  const action=g('jf-action'),challenge=g('jf-challenge'),tomorrow=g('jf-tomorrow');
  if(!academic&&!career&&!personal&&!action){toast('Isi minimal satu bagian!','var(--coral)');return;}
  const mood=sMood||(exId?ST.journal.find(e=>e.id===exId)?.mood:'')||'';
  const goalRating=sRating||(exId?ST.journal.find(e=>e.id===exId)?.goalRating:'')||'';
  if(exId){const i=ST.journal.findIndex(e=>e.id===exId);if(i>=0)ST.journal[i]={...ST.journal[i],academic,career,personal,action,challenge,tomorrow,mood,goalRating};}
  else{ST.journal=ST.journal.filter(e=>e.date!==TODAY);ST.journal.push({id:uid(),date:TODAY,academic,career,personal,action,challenge,tomorrow,mood,goalRating});}
  editId=null;sMood='';sRating='';
  const ok=await saveAll();
  toast(ok?'Jurnal disimpan ✅':'⚠️ Simpan gagal - data tetap ada selama sesi ini',ok?'var(--green)':'var(--coral)');
  renderJournal();
}
function startEdit(id){const e=ST.journal.find(x=>x.id===id);editId=id;sMood=e?.mood||'';sRating=e?.goalRating||'';renderJournal();}
function cancelEdit(){editId=null;renderJournal();}

const TIERS=[{k:'pendek',lbl:'Jangka Pendek',col:'var(--coral)',desc:'Dalam 1 tahun'},{k:'menengah',lbl:'Jangka Menengah',col:'var(--green)',desc:'1–3 tahun'},{k:'panjang',lbl:'Jangka Panjang',col:'var(--purple)',desc:'3–10 tahun'}];
function renderGoals(){
  const has=ST.goals.pendek.length||ST.goals.menengah.length||ST.goals.panjang.length;
  const pr=!has?`<div class="goals-empty-box"><h3>Belum ada goals 🎯</h3><p>Tambahkan tujuanmu atau muat contoh dari program.</p><button class="btn-g" onclick="loadDefGoals()">+ Muat Contoh Goals</button></div>`:'';
  const th=TIERS.map(t=>{
    const gs=ST.goals[t.k]||[];
    const gH=gs.length?gs.map(g=>{
      const lH=(g.updates||[]).slice(-2).map(u=>`<div class="goal-log-item"><span class="gl-dt">${fmtS(u.date)}</span><span class="gl-pct">${u.pct}%</span><span>${u.note||''}</span></div>`).join('');
      return`<div class="goal-item" id="gi-${g.id}"><div class="goal-item-top"><span class="goal-item-text">${g.text}</span><span class="goal-item-pct" style="color:${t.col}">${g.pct||0}%</span></div><div class="goal-pbar"><div class="goal-pbar-fill" id="gpf-${g.id}" style="width:${g.pct||0}%;background:${t.col}"></div></div><div class="goal-controls"><input type="range" class="goal-slider" min="0" max="100" step="5" value="${g.pct||0}" oninput="prevGoal('${g.id}',this.value,'${t.col}')"><div class="goal-ctrl-row"><input type="text" class="goal-note-inp" id="gn-${g.id}" placeholder="Catatan..."><button class="btn-upd" onclick="updGoal('${t.k}','${g.id}')">✔</button><button class="btn-del-g" onclick="delGoal('${t.k}','${g.id}')">✕</button></div></div>${g.updates?.length?`<div class="goal-log">${lH}</div>`:''}</div>`;
    }).join(''):`<p class="hlp" style="padding:7px 0">Belum ada goal. Tambahkan di bawah.</p>`;
    return`<div class="tier-sec"><div class="tier-hdr"><span class="tlbl ${t.k}">${t.lbl}</span><span class="tier-sub">${t.desc}</span></div>${gH}<div class="add-goal-row"><input type="text" class="add-goal-inp" id="ng-${t.k}" placeholder="Tambah goal baru..."><button class="btn-add-g" onclick="addGoal('${t.k}')">+</button></div></div>`;
  }).join('');
  document.getElementById('d3').innerHTML = pr+th;
}
function prevGoal(id,val,col){const p=document.querySelector(`#gi-${id} .goal-item-pct`),f=document.getElementById('gpf-'+id);if(p)p.textContent=val+'%';if(f)f.style.width=val+'%';}
async function updGoal(tier,id){const gs=ST.goals[tier],i=gs.findIndex(g=>g.id===id);if(i<0)return;const sl=document.querySelector(`#gi-${id} .goal-slider`),ni=document.getElementById('gn-'+id);gs[i].pct=parseInt(sl?.value||0);if(!gs[i].updates)gs[i].updates=[];gs[i].updates.push({date:TODAY,pct:gs[i].pct,note:ni?.value.trim()||''});const ok=await saveAll();toast(ok?'Progress diperbarui ✅':'⚠️ Gagal menyimpan',ok?'var(--green)':'var(--coral)');renderGoals();}
async function addGoal(tier){const inp=document.getElementById('ng-'+tier),txt=inp?.value.trim();if(!txt){toast('Tulis tujuanmu dulu','var(--coral)');return;}if(!ST.goals[tier])ST.goals[tier]=[];ST.goals[tier].push({id:uid(),text:txt,pct:0,updates:[]});await saveAll();toast('Goal ditambahkan ✅');renderGoals();}
async function delGoal(tier,id){if(!confirm('Hapus goal ini?'))return;ST.goals[tier]=ST.goals[tier].filter(g=>g.id!==id);await saveAll();toast('Goal dihapus');renderGoals();}
async function loadDefGoals(){for(const t of['pendek','menengah','panjang'])ST.goals[t]=DEF[t].map(text=>({id:uid(),text,pct:0,updates:[]}));await saveAll();toast('Contoh goals dimuat ✅');renderGoals();}

// ══════════════════════════════════════════════════
// TAB 4: PORTFOLIO
// ══════════════════════════════════════════════════
function renderPortfolio(){
  const cats=['all','academic','career','technical','personal','social'];
  const cL={all:'Semua',academic:'📖 Akademik',career:'🚀 Karier',technical:'⚙️ Teknis',personal:'🌱 Personal',social:'👥 Sosial'};
  const fil=portFilter==='all'?ST.portfolio:ST.portfolio.filter(p=>p.category===portFilter);
  const sorted=[...fil].sort((a,b)=>b.date.localeCompare(a.date));
  const cF=`<div class="port-filter-row">${cats.map(c=>`<button class="pf${portFilter===c?' active':''}" onclick="fPort('${c}')">${cL[c]}</button>`).join('')}</div>`;
  const items=sorted.length?`<div class="port-grid">${sorted.map(p=>`<div class="port-item"><button class="port-del" onclick="delPort('${p.id}')">✕</button><span class="pcat ${p.category}">${cL[p.category]||p.category}</span><h4>${p.title}</h4><p>${p.desc}</p><div class="port-item-date">${fmtD(p.date)}</div></div>`).join('')}</div>`:`<div class="port-empty">📭 Belum ada item${portFilter!=='all'?' di kategori ini':''}.</div>`;
  document.getElementById('d4').innerHTML=`<div class="card"><div class="card-title">➕ Tambah Item</div><div class="fg"><label>Judul / Nama Item</label><input type="text" id="po-t" placeholder="Sertifikat Cisco, Proyek Web..."></div><div class="form-row"><div class="fg"><label>Kategori</label><select id="po-c"><option value="academic">📖 Akademik</option><option value="career">🚀 Karier</option><option value="technical">⚙️ Teknis</option><option value="personal">🌱 Personal</option><option value="social">👥 Sosial</option></select></div></div><div class="fg"><label>Deskripsi</label><textarea id="po-d" placeholder="Apa yang dicapai? Apa yang dipelajari?"></textarea></div><button class="btn-g full" onclick="addPort()">+ Tambahkan</button></div><div class="sec-lbl" style="margin-top:4px">Koleksi (${ST.portfolio.length} item)</div>${cF}${items}`;
}
function fPort(c){portFilter=c;renderPortfolio();}
async function addPort(){const t=document.getElementById('po-t')?.value.trim(),desc=document.getElementById('po-d')?.value.trim(),cat=document.getElementById('po-c')?.value;if(!t){toast('Masukkan judul item','var(--coral)');return;}ST.portfolio.push({id:uid(),title:t,desc:desc||'',category:cat,date:TODAY});const ok=await saveAll();toast(ok?'Item ditambahkan ✅':'⚠️ Gagal menyimpan',ok?'var(--green)':'var(--coral)');renderPortfolio();}
async function delPort(id){if(!confirm('Hapus item ini?'))return;ST.portfolio=ST.portfolio.filter(p=>p.id!==id);await saveAll();toast('Dihapus');renderPortfolio();}

// ══════════════════════════════════════════════════
// TAB 5: RENCANA KARIER
// ══════════════════════════════════════════════════
function renderCP(){
  const pf=ST.profile.nama&&ST.profile.kelas;
  const ed=ST.milestones.ex.filter(Boolean).length,pd=ST.milestones.pl.filter(Boolean).length;
  const eP=Math.round(ed/EX_MS.length*100),pP=Math.round(pd/PL_MS.length*100);
  const jurOpts=[['','-- Pilih --'],['tkj','TKJ'],['rpl','RPL'],['mm','Multimedia'],['akl','AKL'],['bdp','BDP'],['tkr','TKR'],['farmasi','Farmasi'],['kuliner','Kuliner'],['perhotelan','Perhotelan'],['other','Lainnya']];
  const exH=EX_MS.map((m,i)=>`<div class="ms-item${ST.milestones.ex[i]?' done':''}" onclick="togMS('ex',${i})"><div class="ms-check">${ST.milestones.ex[i]?'✓':''}</div><span class="ms-text">${m}</span>${ST.milestones.ex[i]&&ST.milestones.exD[i]?`<span class="ms-date">${fmtS(ST.milestones.exD[i])}</span>`:''}</div>`).join('');
  const plH=PL_MS.map((m,i)=>`<div class="ms-item${ST.milestones.pl[i]?' done':''}" onclick="togMS('pl',${i})"><div class="ms-check">${ST.milestones.pl[i]?'✓':''}</div><span class="ms-text">${m}</span>${ST.milestones.pl[i]&&ST.milestones.plD[i]?`<span class="ms-date">${fmtS(ST.milestones.plD[i])}</span>`:''}</div>`).join('');
  
  // Backup/restore section
  const backupHtml=`<div class="card" style="margin-top:4px"><div class="card-title">🔒 Backup & Restore Data</div><p class="card-sub">Jika data hilang setelah menutup halaman, gunakan fitur backup ini.</p><button class="btn-g full" onclick="exportData()" style="margin-bottom:8px">📤 Export / Salin Backup Data</button><div class="fg"><label>Tempel Data Backup untuk Restore</label><textarea id="restore-ta" placeholder='Tempel data JSON di sini...'></textarea></div><button class="btn-o full" onclick="importData()">📥 Restore dari Backup</button></div>`;
  
  document.getElementById('d5').innerHTML=`<div class="card"><div class="card-title">👤 Profil Siswa</div><div class="fg"><label>Nama Lengkap</label><input type="text" id="cp-n" value="${ST.profile.nama||''}" placeholder="Nama lengkap"></div><div class="form-row"><div class="fg"><label>Kelas</label><input type="text" id="cp-k" value="${ST.profile.kelas||''}" placeholder="Contoh: XI TKJ 1"></div><div class="fg"><label>Jurusan</label><select id="cp-j">${jurOpts.map(([v,l])=>`<option value="${v}" ${ST.profile.jurusan===v?'selected':''}>${l}</option>`).join('')}</select></div></div><div class="fg"><label>Pilihan Pasca SMK</label><select id="cp-p"><option value="" ${!ST.profile.pilihan?'selected':''}>-- Pilih --</option><option value="kerja" ${ST.profile.pilihan==='kerja'?'selected':''}>💼 Bekerja</option><option value="kuliah" ${ST.profile.pilihan==='kuliah'?'selected':''}>🎓 Kuliah</option><option value="wirausaha" ${ST.profile.pilihan==='wirausaha'?'selected':''}>🏢 Wirausaha</option></select></div><div class="fg"><label>Bidang / Profesi Diminati</label><input type="text" id="cp-b" value="${ST.profile.bidang||''}" placeholder="Contoh: Web Developer, Akuntansi..."></div><div class="fg"><label>Motivasi Utama</label><textarea id="cp-m" style="min-height:54px" placeholder="Apa yang mendorongmu?">${ST.profile.motivasi||''}</textarea></div><div class="row-btns"><button class="btn-g" onclick="saveCP()">Simpan Profil</button>${pf?`<span style="font-size:.76rem;color:var(--green);font-weight:600">✅ Lengkap</span>`:''}</div></div><div class="cp-phase"><div class="cp-phase-hdr"><div class="cp-phase-icon">🔭</div><div><h3>Fase 1 — Career Exploration</h3><p class="cp-desc">Mengenal diri & eksplorasi dunia karier</p></div></div><div class="cp-pline"><div class="cp-pfill" style="width:${eP}%;background:var(--green)"></div></div><div class="cp-pstat"><span>${ed}/${EX_MS.length} milestone</span><span style="color:var(--green);font-weight:700">${eP}%</span></div><div class="ms-list">${exH}</div></div><div class="cp-phase"><div class="cp-phase-hdr"><div class="cp-phase-icon">🚀</div><div><h3>Fase 2 — Career Planning</h3><p class="cp-desc">Menyusun & mempersiapkan rencana konkret</p></div></div><div class="cp-pline"><div class="cp-pfill" style="width:${pP}%;background:var(--coral)"></div></div><div class="cp-pstat"><span>${pd}/${PL_MS.length} milestone</span><span style="color:var(--coral);font-weight:700">${pP}%</span></div><div class="ms-list">${plH}</div></div>${backupHtml}`;
}

async function saveCP(){
  ST.profile={...ST.profile,
    nama:document.getElementById('cp-n')?.value.trim()||ST.profile.nama||'',
    kelas:document.getElementById('cp-k')?.value.trim()||'',
    jurusan:document.getElementById('cp-j')?.value||'',
    pilihan:document.getElementById('cp-p')?.value||'',
    bidang:document.getElementById('cp-b')?.value.trim()||'',
    motivasi:document.getElementById('cp-m')?.value.trim()||''
  };
  const ok=await saveAll();
  updateHeader();
  toast(ok?'Profil disimpan ✅':'⚠️ Gagal menyimpan',ok?'var(--green)':'var(--coral)');
  renderCP();
}

async function togMS(phase,idx){
  ST.milestones[phase][idx]=!ST.milestones[phase][idx];
  const dk=phase+'D';
  if(!ST.milestones[dk])ST.milestones[dk]=[];
  ST.milestones[dk][idx]=ST.milestones[phase][idx]?TODAY:null;
  await saveAll();
  renderCP();
}

// ══════════════════════════════════════════════════
// BACKUP / RESTORE
// ══════════════════════════════════════════════════
function exportData(){
  const json = JSON.stringify(ST, null, 2);
  // Show in modal for user to copy
  document.getElementById('modal-body').innerHTML=`<h3>📤 Backup Data</h3><p style="font-size:.8rem;color:var(--ink3);margin-bottom:10px;line-height:1.5">Salin semua teks di bawah ini dan simpan di tempat aman (Notes, Email ke diri sendiri, dsb).</p><textarea style="width:100%;height:180px;background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;padding:10px;font-family:monospace;font-size:.68rem;color:var(--ink2);resize:none;outline:none" readonly onclick="this.select()">${json}</textarea><div class="row-btns"><button class="btn-g" onclick="if(navigator.clipboard)navigator.clipboard.writeText(document.querySelector('#modal-body textarea').value).then(()=>toast('Data disalin! ✅'));else toast('Pilih semua teks lalu salin manual','var(--coral)')">📋 Salin ke Clipboard</button><button class="btn-o" onclick="closeModal()">Tutup</button></div>`;
  document.getElementById('modal').classList.remove('hidden');
}

async function importData(){
  const ta = document.getElementById('restore-ta');
  if(!ta?.value.trim()){toast('Tempel data backup terlebih dahulu','var(--coral)');return;}
  try{
    const parsed = JSON.parse(ta.value.trim());
    if(!parsed.profile) throw new Error('Format tidak valid');
    if(parsed.profile) ST.profile = parsed.profile;
    if(Array.isArray(parsed.journal)) ST.journal = parsed.journal;
    if(parsed.goals) ST.goals = { pendek:[], menengah:[], panjang:[], ...parsed.goals };
    if(Array.isArray(parsed.portfolio)) ST.portfolio = parsed.portfolio;
    if(parsed.milestones) ST.milestones = { ...ST.milestones, ...parsed.milestones };
    const ok = await saveAll();
    toast(ok?'Data berhasil di-restore ✅':'Data di-restore (simpan manual gagal)','var(--green)');
    updateHeader();
    renderCP();
  }catch(e){
    toast('Format data tidak valid!','var(--coral)');
  }
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
window.addEventListener('load', async () => {
  document.getElementById('modal').addEventListener('click', e => {
    if(e.target === document.getElementById('modal')) closeModal();
  });
  
  // Load state from storage
  await loadAll();
  
  if(ST.profile.nama){
    // Returning user — skip onboarding
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    updateHeader();
    renderEksplorasi();
  } else {
    // New user — show onboarding
    document.getElementById('onboarding').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});
</script>
